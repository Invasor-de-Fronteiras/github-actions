name: Deploy Reusable Workflows

on:
  workflow_call:
    inputs:
      deployments_names:
        description: 'Comma-separated list of deployment workflow names to run. If empty, all reusable workflows will be run.'
        required: false
        default: ''
        type: string
      release_step_enabled:
        required: false
        default: true
        type: boolean

jobs:
  get_next_version:
    name: Get Next Version
    uses: Invasor-de-Fronteiras/github-actions/.github/workflows/reusable-release.yml@main
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    secrets: inherit
    with:
      dry_run: true
      create-branch: false
      release-config-content: |
        {
          "branches": [
            {"name": "main"},
            {"name": "next", "channel": "@next", "prerelease": true}
          ],
          "tagFormat": "v${version}",
          "plugins": [
            ["@semantic-release/commit-analyzer", {"preset": "conventionalcommits"}],
            ["@semantic-release/exec", {"prepareCmd": "echo ${nextRelease.version} >> version.txt"}]
          ]
        }

  prepare_matrix:
    name: Prepare Deploy Matrix
    runs-on: ubuntu-latest
    outputs:
      repository_lowercase: ${{ steps.repo_lowercase.outputs.repository_lowercase }}
      matrix: ${{ steps.set_matrix.outputs.matrix }}
    steps:
      - name: Set repository name to lowercase
        id: repo_lowercase
        run: echo "repository_lowercase=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Build deployment matrix
        id: set_matrix
        env:
          DEPLOY_NAMES: ${{ inputs.deployments_names }}
        run: |
          if [[ -z "$DEPLOY_NAMES" ]]; then
            echo "No deployment names provided, running all reusable workflows."
            echo 'matrix={"suffix":[""]}' >> $GITHUB_OUTPUT
          else
            echo "Deployment names provided: $DEPLOY_NAMES"
            SUFFIXES=$(echo "$DEPLOY_NAMES" | tr ',' '\n' | sed 's/^/-/' | jq -Rsc '[splits("\n") | select(. != "")]')
            echo "matrix={\"suffix\":$SUFFIXES}" >> $GITHUB_OUTPUT
          fi

  docker_build:
    name: Build and Push Docker Image
    needs: [get_next_version, prepare_matrix]
    if: needs.get_next_version.outputs.released == 'true'
    uses: Invasor-de-Fronteiras/github-actions/.github/workflows/reusable-docker-build.yml@main
    secrets: inherit
    permissions:
      contents: write
      packages: write
      id-token: write
    with:
      metadata_tags: |
        type=raw,value=${{ needs.get_next_version.outputs.version }}

  bump_version:
    name: Bump Version and Create GitHub Release
    needs: [docker_build]
    uses: Invasor-de-Fronteiras/github-actions/.github/workflows/reusable-release.yml@main
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    secrets: inherit
    with:
      create-branch: true
      release-config-content: |
        {
          "branches": [
            {"name": "main"},
            {"name": "next", "channel": "@next", "prerelease": true}
          ],
          "tagFormat": "v${version}",
          "plugins": [
            ["@semantic-release/commit-analyzer", {"preset": "conventionalcommits"}],
            ["@semantic-release/exec", {"prepareCmd": "echo ${nextRelease.version} >> version.txt"}],
            "@semantic-release/release-notes-generator",
            "@semantic-release/git",
            "@semantic-release/github"
          ]
        }

  update_manifests:
    name: Deploy Version to Environments
    uses: Invasor-de-Fronteiras/github-actions/.github/workflows/reusable-commit-app.yml@main
    needs: [bump_version, prepare_matrix]
    if: github.ref == 'refs/heads/main' && inputs.release_step_enabled == true
    permissions:
      contents: write
      id-token: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}
    with:
      repository: Invasor-de-Fronteiras/kelbi-applications
      app-content: |
        {"image":"ghcr.io/${{ needs.prepare_matrix.outputs.repository_lowercase }}:${{ needs.bump_version.outputs.version }}"}
      app-path: apps/${{ github.repository }}${{ matrix.suffix }}
      app-filename: values
      app-file-extension: yaml
      aws_ssm_parameter_gh_pat: /arca/github-deploy-apps/token
      aws_ssm_parameter_gh_pat_region: us-east-1
      aws_role_to_assume: arn:aws:iam::545888714756:role/${{ github.repository_id }}-github-role
